<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎓 学生选课系统 - 实时抢课平台</title>
    <style>
        :root {
            --primary: #4f46e5;
            --primary-light: #6366f1;
            --primary-dark: #3730a3;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --bg: #f1f5f9;
            --card-bg: #ffffff;
            --text: #1e293b;
            --text-secondary: #64748b;
            --border: #e2e8f0;
            --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.06), 0 1px 2px rgba(0, 0, 0, 0.04);
            --shadow: 0 4px 6px rgba(0, 0, 0, 0.07), 0 2px 4px rgba(0, 0, 0, 0.06);
            --shadow-lg: 0 10px 25px rgba(0, 0, 0, 0.1), 0 4px 10px rgba(0, 0, 0, 0.08);
            --radius: 16px;
            --radius-sm: 10px;
            --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', 'Noto Sans SC', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* 背景装饰 */
        body::before {
            content: '';
            position: fixed;
            top: -200px;
            right: -200px;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(79, 70, 229, 0.06) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
        }
        body::after {
            content: '';
            position: fixed;
            bottom: -250px;
            left: -150px;
            width: 700px;
            height: 700px;
            background: radial-gradient(circle, rgba(16, 185, 129, 0.05) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
        }

        /* ============ 顶部导航栏 ============ */
        .navbar {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            box-shadow: var(--shadow-sm);
            padding: 0 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 64px;
            gap: 20px;
        }
        .navbar-brand {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--primary);
            white-space: nowrap;
        }
        .navbar-brand .icon {
            width: 38px;
            height: 38px;
            background: linear-gradient(135deg, var(--primary), #8b5cf6);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            color: #fff;
            flex-shrink: 0;
        }
        .navbar-stats {
            display: flex;
            gap: 18px;
            align-items: center;
            flex-wrap: wrap;
        }
        .stat-badge {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.875rem;
            font-weight: 600;
            padding: 7px 14px;
            border-radius: 20px;
            background: #f8fafc;
            border: 1px solid var(--border);
            white-space: nowrap;
            transition: var(--transition);
        }
        .stat-badge .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            flex-shrink: 0;
        }
        .dot.green {
            background: var(--success);
            box-shadow: 0 0 8px rgba(16, 185, 129, 0.5);
            animation: pulse-dot 2s infinite;
        }
        .dot.orange {
            background: var(--warning);
            box-shadow: 0 0 8px rgba(245, 158, 11, 0.5);
            animation: pulse-dot 1.5s infinite;
        }
        .dot.blue {
            background: var(--primary);
            box-shadow: 0 0 8px rgba(79, 70, 229, 0.5);
            animation: pulse-dot 2.5s infinite;
        }
        @keyframes pulse-dot {
            0%,
            100% {
                box-shadow: 0 0 4px currentColor;
            }
            50% {
                box-shadow: 0 0 16px currentColor;
            }
        }
        .student-info {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 600;
            font-size: 0.9rem;
            color: var(--text);
            background: #f1f5f9;
            padding: 7px 14px;
            border-radius: 20px;
            white-space: nowrap;
        }
        .student-avatar {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background: linear-gradient(135deg, #6366f1, #a855f7);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 0.8rem;
            font-weight: 700;
            flex-shrink: 0;
        }

        /* ============ 主布局 ============ */
        .main-container {
            position: relative;
            z-index: 1;
            display: grid;
            grid-template-columns: 1fr 380px;
            gap: 20px;
            padding: 20px 24px;
            max-width: 1500px;
            margin: 0 auto;
            min-height: calc(100vh - 64px);
        }

        /* ============ 课程区域 ============ */
        .courses-section {
            min-width: 0;
        }
        .section-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 16px;
        }
        .section-title {
            font-size: 1.35rem;
            font-weight: 700;
            color: var(--text);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .section-title .emoji {
            font-size: 1.5rem;
        }
        .live-indicator {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.8rem;
            color: var(--success);
            font-weight: 600;
            animation: fadeInOut 2s infinite;
        }
        .live-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--success);
            animation: pulse-dot 1.2s infinite;
        }
        @keyframes fadeInOut {
            0%,
            100% {
                opacity: 1;
            }
            50% {
                opacity: 0.5;
            }
        }

        /* 搜索与筛选栏 */
        .toolbar {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 16px;
            align-items: center;
        }
        .search-input {
            flex: 1;
            min-width: 180px;
            padding: 10px 16px;
            border: 2px solid var(--border);
            border-radius: 25px;
            font-size: 0.9rem;
            outline: none;
            transition: var(--transition);
            background: var(--card-bg);
            color: var(--text);
        }
        .search-input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1);
        }
        .filter-btn {
            padding: 9px 16px;
            border-radius: 25px;
            border: 2px solid var(--border);
            background: var(--card-bg);
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 600;
            transition: var(--transition);
            white-space: nowrap;
            color: var(--text-secondary);
        }
        .filter-btn:hover {
            border-color: var(--primary-light);
            color: var(--primary);
        }
        .filter-btn.active {
            background: var(--primary);
            color: #fff;
            border-color: var(--primary);
        }
        .sort-select {
            padding: 9px 14px;
            border-radius: 25px;
            border: 2px solid var(--border);
            background: var(--card-bg);
            font-size: 0.85rem;
            cursor: pointer;
            outline: none;
            font-weight: 600;
            color: var(--text-secondary);
            transition: var(--transition);
        }
        .sort-select:focus {
            border-color: var(--primary);
        }
        .refresh-btn {
            padding: 9px 14px;
            border-radius: 25px;
            border: 2px solid var(--border);
            background: var(--card-bg);
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 600;
            transition: var(--transition);
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .refresh-btn:hover {
            background: #f1f5f9;
            border-color: #cbd5e1;
        }
        .refresh-btn.spinning .refresh-icon {
            animation: spin 0.6s ease-in-out;
        }
        @keyframes spin {
            100% {
                transform: rotate(360deg);
            }
        }

        /* 课程卡片网格 */
        .courses-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 14px;
        }
        .course-card {
            background: var(--card-bg);
            border-radius: var(--radius);
            padding: 18px 20px;
            box-shadow: var(--shadow);
            transition: var(--transition);
            border: 2px solid transparent;
            position: relative;
            overflow: hidden;
            cursor: default;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .course-card:hover {
            transform: translateY(-3px);
            box-shadow: var(--shadow-lg);
            border-color: #e0e7ff;
        }
        .course-card.flash-update {
            animation: flashBorder 0.6s ease-out;
        }
        @keyframes flashBorder {
            0% {
                border-color: var(--warning);
                box-shadow: 0 0 20px rgba(245, 158, 11, 0.3);
            }
            100% {
                border-color: transparent;
                box-shadow: var(--shadow);
            }
        }
        .course-card.hot-course {
            border-left: 4px solid var(--danger);
        }
        .course-card.countdown-course {
            border-left: 4px solid var(--warning);
            background: #fffdf5;
        }
        .course-card.full-course {
            opacity: 0.7;
            background: #f8fafc;
            border-left: 4px solid #cbd5e1;
        }
        .course-card.full-course:hover {
            transform: none;
            border-color: #e2e8f0;
        }
        .course-tags {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }
        .tag {
            font-size: 0.7rem;
            font-weight: 700;
            padding: 4px 10px;
            border-radius: 12px;
            letter-spacing: 0.3px;
            text-transform: uppercase;
        }
        .tag-category {
            background: #ede9fe;
            color: #6d28d9;
        }
        .tag-hot {
            background: #fef2f2;
            color: #dc2626;
            animation: pulse-tag 1.5s infinite;
        }
        @keyframes pulse-tag {
            0%,
            100% {
                background: #fef2f2;
            }
            50% {
                background: #fecaca;
            }
        }
        .tag-countdown {
            background: #fffbeb;
            color: #d97706;
        }
        .tag-new {
            background: #d1fae5;
            color: #059669;
        }
        .course-name {
            font-size: 1.05rem;
            font-weight: 700;
            color: var(--text);
            line-height: 1.3;
        }
        .course-meta {
            display: flex;
            gap: 14px;
            flex-wrap: wrap;
            font-size: 0.8rem;
            color: var(--text-secondary);
        }
        .course-meta span {
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .capacity-bar-wrap {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .capacity-bar {
            flex: 1;
            height: 8px;
            background: #e2e8f0;
            border-radius: 10px;
            overflow: hidden;
        }
        .capacity-bar-fill {
            height: 100%;
            border-radius: 10px;
            transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .capacity-bar-fill.green {
            background: linear-gradient(90deg, #10b981, #34d399);
        }
        .capacity-bar-fill.orange {
            background: linear-gradient(90deg, #f59e0b, #fbbf24);
        }
        .capacity-bar-fill.red {
            background: linear-gradient(90deg, #ef4444, #f87171);
            animation: urgent-pulse 0.8s infinite;
        }
        @keyframes urgent-pulse {
            0%,
            100% {
                opacity: 1;
            }
            50% {
                opacity: 0.6;
            }
        }
        .capacity-bar-fill.full {
            background: #cbd5e1;
        }
        .remaining-text {
            font-weight: 700;
            font-size: 0.85rem;
            white-space: nowrap;
            min-width: 50px;
            text-align: right;
        }
        .remaining-text.green {
            color: #059669;
        }
        .remaining-text.orange {
            color: #d97706;
        }
        .remaining-text.red {
            color: #dc2626;
        }
        .remaining-text.full {
            color: #94a3b8;
        }
        .course-actions {
            display: flex;
            gap: 8px;
            margin-top: auto;
        }
        .btn {
            padding: 9px 18px;
            border-radius: 22px;
            border: none;
            cursor: pointer;
            font-weight: 700;
            font-size: 0.85rem;
            transition: var(--transition);
            letter-spacing: 0.2px;
            position: relative;
            overflow: hidden;
            text-align: center;
            flex: 1;
        }
        .btn:active {
            transform: scale(0.95);
        }
        .btn-grab {
            background: linear-gradient(135deg, #4f46e5, #6366f1);
            color: #fff;
            box-shadow: 0 4px 12px rgba(79, 70, 229, 0.35);
        }
        .btn-grab:hover {
            background: linear-gradient(135deg, #4338ca, #4f46e5);
            box-shadow: 0 6px 20px rgba(79, 70, 229, 0.5);
            transform: translateY(-2px);
        }
        .btn-grab:disabled {
            background: #cbd5e1;
            color: #94a3b8;
            cursor: not-allowed;
            box-shadow: none;
            transform: none;
        }
        .btn-grab:disabled:hover {
            box-shadow: none;
            transform: none;
        }
        .btn-drop {
            background: #fff;
            color: #dc2626;
            border: 2px solid #fecaca;
        }
        .btn-drop:hover {
            background: #fef2f2;
            border-color: #dc2626;
        }
        .btn-detail {
            background: #f1f5f9;
            color: var(--text-secondary);
            border: 1px solid var(--border);
            flex: 0.5;
            font-size: 0.8rem;
        }
        .btn-detail:hover {
            background: #e2e8f0;
        }
        .btn-countdown {
            background: #fef3c7;
            color: #92400e;
            cursor: not-allowed;
            font-weight: 700;
            letter-spacing: 0.5px;
        }
        /* 抢课成功动画 */
        .btn-grab.success-flash {
            animation: successPulse 0.5s ease-out;
            background: linear-gradient(135deg, #10b981, #34d399) !important;
        }
        @keyframes successPulse {
            0% {
                transform: scale(1);
                box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7);
            }
            50% {
                transform: scale(1.08);
                box-shadow: 0 0 0 20px rgba(16, 185, 129, 0);
            }
            100% {
                transform: scale(1);
                box-shadow: 0 0 0 0 rgba(16, 185, 129, 0);
            }
        }
        /* 失败抖动 */
        .btn-grab.fail-shake {
            animation: shake 0.5s ease-out;
            background: linear-gradient(135deg, #ef4444, #f87171) !important;
        }
        @keyframes shake {
            0%,
            100% {
                transform: translateX(0);
            }
            20% {
                transform: translateX(-6px);
            }
            40% {
                transform: translateX(6px);
            }
            60% {
                transform: translateX(-4px);
            }
            80% {
                transform: translateX(4px);
            }
        }

        /* ============ 侧边栏 - 已选课程 ============ */
        .sidebar {
            position: sticky;
            top: 84px;
            align-self: start;
            display: flex;
            flex-direction: column;
            gap: 14px;
            max-height: calc(100vh - 100px);
        }
        .sidebar-card {
            background: var(--card-bg);
            border-radius: var(--radius);
            padding: 20px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
        }
        .sidebar-title {
            font-weight: 700;
            font-size: 1.1rem;
            margin-bottom: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .credit-summary {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        .credit-bar-wrap {
            height: 10px;
            background: #e2e8f0;
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 6px;
        }
        .credit-bar-fill {
            height: 100%;
            border-radius: 10px;
            background: linear-gradient(90deg, #6366f1, #8b5cf6);
            transition: width 0.5s ease;
        }
        .credit-text {
            font-size: 0.8rem;
            color: var(--text-secondary);
            text-align: right;
        }
        .credit-text.warning {
            color: #dc2626;
            font-weight: 700;
        }
        .my-course-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 12px;
            border-radius: var(--radius-sm);
            background: #f8fafc;
            margin-bottom: 8px;
            gap: 8px;
            transition: var(--transition);
            border: 1px solid transparent;
        }
        .my-course-item:hover {
            background: #f1f5f9;
            border-color: #e2e8f0;
        }
        .my-course-item .course-info {
            flex: 1;
            min-width: 0;
        }
        .my-course-item .course-name-sm {
            font-weight: 600;
            font-size: 0.85rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .my-course-item .course-credits-sm {
            font-size: 0.75rem;
            color: var(--text-secondary);
        }
        .btn-drop-sm {
            padding: 6px 12px;
            border-radius: 15px;
            border: 1px solid #fecaca;
            background: #fff;
            color: #dc2626;
            cursor: pointer;
            font-size: 0.75rem;
            font-weight: 600;
            transition: var(--transition);
            white-space: nowrap;
            flex-shrink: 0;
        }
        .btn-drop-sm:hover {
            background: #fef2f2;
            border-color: #dc2626;
        }
        .empty-state {
            text-align: center;
            padding: 30px 10px;
            color: #cbd5e1;
        }
        .empty-state .icon {
            font-size: 3rem;
            display: block;
            margin-bottom: 10px;
        }
        .btn-clear-all {
            width: 100%;
            padding: 10px;
            border-radius: 20px;
            border: 1px solid #e2e8f0;
            background: #fff;
            cursor: pointer;
            font-weight: 600;
            color: var(--text-secondary);
            transition: var(--transition);
            font-size: 0.85rem;
        }
        .btn-clear-all:hover {
            background: #fef2f2;
            color: #dc2626;
            border-color: #fecaca;
        }

        /* ============ Toast 消息 ============ */
        .toast-container {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 2000;
            display: flex;
            flex-direction: column;
            gap: 8px;
            pointer-events: none;
        }
        .toast {
            padding: 12px 20px;
            border-radius: 25px;
            font-weight: 700;
            font-size: 0.9rem;
            color: #fff;
            animation: toastIn 0.4s ease-out, toastOut 0.3s ease-in 2.2s forwards;
            pointer-events: auto;
            box-shadow: var(--shadow-lg);
            text-align: center;
            white-space: nowrap;
        }
        .toast.success {
            background: #10b981;
        }
        .toast.error {
            background: #ef4444;
        }
        .toast.info {
            background: #3b82f6;
        }
        .toast.warning {
            background: #f59e0b;
        }
        @keyframes toastIn {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        @keyframes toastOut {
            from {
                opacity: 1;
                transform: translateY(0);
            }
            to {
                opacity: 0;
                transform: translateY(-20px);
            }
        }

        /* ============ 模态框 ============ */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1500;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: fadeIn 0.2s ease-out;
        }
        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }
        .modal {
            background: #fff;
            border-radius: var(--radius);
            padding: 28px;
            max-width: 480px;
            width: 90%;
            box-shadow: var(--shadow-lg);
            animation: modalSlideIn 0.3s ease-out;
        }
        @keyframes modalSlideIn {
            from {
                opacity: 0;
                transform: translateY(20px) scale(0.95);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }
        .modal h3 {
            margin-bottom: 12px;
            font-size: 1.2rem;
        }
        .modal p {
            margin-bottom: 8px;
            font-size: 0.9rem;
            color: var(--text-secondary);
        }
        .modal-actions {
            display: flex;
            gap: 10px;
            margin-top: 18px;
            justify-content: flex-end;
        }
        .btn-modal {
            padding: 10px 20px;
            border-radius: 20px;
            border: none;
            cursor: pointer;
            font-weight: 700;
            font-size: 0.85rem;
            transition: var(--transition);
        }
        .btn-modal.confirm {
            background: var(--primary);
            color: #fff;
        }
        .btn-modal.confirm:hover {
            background: var(--primary-dark);
        }
        .btn-modal.cancel {
            background: #f1f5f9;
            color: var(--text-secondary);
        }
        .btn-modal.cancel:hover {
            background: #e2e8f0;
        }

        /* ============ 响应式 ============ */
        @media (max-width: 1100px) {
            .main-container {
                grid-template-columns: 1fr;
                padding: 14px 12px;
            }

    <script>
        (function() {

            // ==================== DOM引用 ====================

            const $almostFullCount = document.getElementById('almost-full-count');
            const $searchInput = document.getElementById('searchInput');

            const $refreshBtn = document.getElementById('refreshBtn');

            const $toastContainer = document.getElementById('toastContainer');

            const $modalOverlay = document.getElementById('modalOverlay');

            const $confirmModalOverlay = document.getElementById('confirmModalOverlay');

            const $filterBtns = document.querySelectorAll('.filter-btn');

            // ==================== 初始课程数据 ====================

                { id: 'c001', name: '高等数学A(二)', teacher: '李志强', credits: 5, capacity: 60, enrolled: 42,

                { id: 'c009', name: '人工智能导论', teacher: '周博士', credits: 3, capacity: 35, enrolled: 33, category: '计算机科学',
                    schedule: '周二 5-6节, 周四 7-8节', description: '热门课程！介绍AI、机器学习、深度学习基础。', openTime: null },
                { id: 'c010', name: '中国近代史纲要', teacher: '杨老师', credits: 2, capacity: 70, enrolled: 40, category: '通识教育',
                    schedule: '周三 7-8节', description: '了解中国近现代历史发展脉络。', openTime: null },
                { id: 'c011', name: 'Web前端开发', teacher: '吴帆', credits: 3, capacity: 30, enrolled: 13, category: '计算机科学',
                    schedule: '周一 7-8节, 周五 7-8节', description: 'HTML/CSS/JavaScript及主流框架实战。', openTime: null },
                { id: 'c012', name: '概率论与数理统计', teacher: '郑教授', credits: 3, capacity: 50, enrolled: 20, category: '数学',
                    schedule: '周二 7-8节, 周四 7-8节', description: '概率模型、统计推断与数据分析基础。', openTime: null },
                { id: 'c013', name: '操作系统', teacher: '孙老师', credits: 4, capacity: 38, enrolled: 36, category: '计算机科学',
                    schedule: '周一 1-2节, 周三 1-2节', description: '进程管理、内存管理、文件系统等核心概念。⚠️ 与数据结构时间冲突', openTime: null },
                {
                    id: 'c014',
                    name: '数字电路与逻辑设计',
                    teacher: '黄工',
                    credits: 3,
                    capacity: 40,
                    enrolled: 15,
                    category: '计算机科学',
                    schedule: '周五 1-2节, 周五 3-4节',
                    description: '组合逻辑、时序逻辑电路设计基础。',
                    openTime: null
                },
                { id: 'c015', name: '学术写作', teacher: 'Emily Chen', credits: 2, capacity: 25, enrolled: 6, category: '英语',
                    schedule: '周三 5-6节', description: '英文学术论文写作技巧与实践。', openTime: null },
                { id: 'c016', name: '大学生心理健康', teacher: '林医生', credits: 1, capacity: 60, enrolled: 35, category: '通识教育',
                    schedule: '周四 5-6节', description: '心理健康知识普及与自我调适方法。', openTime: null },
            ];

            // 为部分热门课程设置延迟开放时间（倒计时抢课）
            // c009 人工智能导论: 25秒后开放
            // c006 数据库原理: 18秒后开放
            // c008 大学体育(篮球): 35秒后开放
            const now = Date.now();
            const countdownConfig = {
                'c009': now + 25000, // 25秒后
                'c006': now + 18000, // 18秒后
                'c008': now + 35000, // 35秒后
            };

            // ==================== 状态管理 ====================
            let courses = [];
            let myCourseIds = new Set();
            let currentFilter = 'all';
            let pendingConfirm = null; // 待确认的选课操作

            // ==================== 数据持久化 ====================
            function loadCourses() {
                const stored = localStorage.getItem(STORAGE_KEY_COURSES);
                if (stored) {
                    try {
                        const parsed = JSON.parse(stored);
                        if (Array.isArray(parsed) && parsed.length > 0) {
                            return parsed;
                        }
                    } catch (e) { /* ignore */ }
                }
                // 初始化课程数据
                const initCourses = defaultCourses.map(c => ({
                    ...c,
                    enrolled: c.enrolled,
                    openTime: countdownConfig[c.id] || c.openTime || null,
                }));
                saveCourses(initCourses);
                return initCourses;
            }

            function saveCourses(data) {
                courses = data;
                try {
                    localStorage.setItem(STORAGE_KEY_COURSES, JSON.stringify(data));
                } catch (e) { /* ignore */ }
            }

            function loadMyCourses() {
                const stored = localStorage.getItem(STORAGE_KEY_MY);
                if (stored) {
                    try {
                        const arr = JSON.parse(stored);
                        if (Array.isArray(arr)) {
                            return new Set(arr);
                        }
                    } catch (e) { /* ignore */ }
                }
                return new Set();
            }

            function saveMyCourses() {
                try {
                    localStorage.setItem(STORAGE_KEY_MY, JSON.stringify([...myCourseIds]));
                } catch (e) { /* ignore */ }
            }

            // ==================== 初始化 ====================
            function init() {
                courses = loadCourses();
                myCourseIds = loadMyCourses();
                // 检查并更新倒计时课程状态
                updateCountdownStatus();
                renderAll();
                updateStats();
                startSimulator();
                startUIRefreshLoop();
            }

            function updateCountdownStatus() {
                const now = Date.now();
                let changed = false;
                courses.forEach(c => {
                    if (c.openTime && now >= c.openTime && c._countdownActive !== false) {
                        c._countdownActive = false;
                        c.openTime = null; // 已开放，清除倒计时
                        changed = true;
                    }
                    if (c.openTime && now < c.openTime) {
                        c._countdownActive = true;
                    }
                });
                if (changed) {
                    saveCourses([...courses]);
                }
            }

            // ==================== 模拟器 - 模拟其他学生选课 ====================
            let simulatorTimer = null;

            function startSimulator() {
                if (simulatorTimer) clearInterval(simulatorTimer);
                simulatorTimer = setInterval(() => {
                    simulateOtherStudents();
                }, SIMULATOR_INTERVAL);
            }

            function simulateOtherStudents() {
                updateCountdownStatus();
                const now = Date.now();
                const availableCourses = courses.filter(c => {
                    // 课程还有名额
                    if (c.enrolled >= c.capacity) return false;
                    // 倒计时课程未开放则跳过
                    if (c.openTime && now < c.openTime) return false;
                    // 用户已选的不减（保护）
                    if (myCourseIds.has(c.id)) return false;
                    return true;
                });

                if (availableCourses.length === 0) return;

                // 随机选1-3门课程减少名额
                const count = Math.min(
                    Math.floor(Math.random() * 3) + 1,
                    availableCourses.length
                );
                const shuffled = [...availableCourses].sort(() => Math.random() - 0.5);
                const selected = shuffled.slice(0, count);
                let changed = false;

                selected.forEach(c => {
                    const course = courses.find(co => co.id === c.id);
                    if (course && course.enrolled < course.capacity && !myCourseIds.has(course.id)) {
                        course.enrolled += 1;
                        changed = true;
                    }
                });

                if (changed) {
                    saveCourses([...courses]);
                    // 标记哪些课程被更新了（用于动画）
                    selected.forEach(c => {
                        const el = document.querySelector(`[data-course-id="${c.id}"]`);
                        if (el) {
                            el.classList.add('flash-update');
                            setTimeout(() => el.classList.remove('flash-update'), 700);
                        }
                    });
                    renderAllCoursesGrid();
                    updateStats();
                    updateMyCoursesPanel();
                }
            }

            // ==================== UI刷新循环 ====================
            let uiRefreshTimer = null;

            function startUIRefreshLoop() {
                if (uiRefreshTimer) clearInterval(uiRefreshTimer);
                uiRefreshTimer = setInterval(() => {
                    updateCountdownStatus();
                    const changed = checkExternalChanges();
                    if (changed) {
                        renderAllCoursesGrid();
                        updateStats();
                        updateMyCoursesPanel();
                    } else {
                        // 仅更新倒计时显示
                        updateCountdownDisplays();
                    }
                }, UI_REFRESH_INTERVAL);
            }

            function checkExternalChanges() {
                // 检查localStorage是否有其他标签页的更改
                const stored = localStorage.getItem(STORAGE_KEY_COURSES);
                if (stored) {
                    try {
                        const parsed = JSON.parse(stored);
                        if (JSON.stringify(parsed) !== JSON.stringify(courses)) {
                            courses = parsed;
                            updateCountdownStatus();
                            return true;
                        }
                    } catch (e) { /* ignore */ }
                }
                const storedMy = localStorage.getItem(STORAGE_KEY_MY);
                if (storedMy) {
                    try {
                        const parsed = JSON.parse(storedMy);
                        const newSet = new Set(parsed);
                        if (setsAreDifferent(newSet, myCourseIds)) {
                            myCourseIds = newSet;
                            return true;
                        }
                    } catch (e) { /* ignore */ }
                }
                return false;
            }

            function setsAreDifferent(a, b) {
                if (a.size !== b.size) return true;
                for (const item of a) {
                    if (!b.has(item)) return true;
                }
                return false;
            }

            function updateCountdownDisplays() {
                // 更新所有倒计时课程的显示
                courses.forEach(c => {
                    if (c.openTime && Date.now() < c.openTime) {
                        const el = document.querySelector(`[data-course-id="${c.id}"]`);
                        if (el) {
                            const btnEl = el.querySelector('.btn-countdown, .btn-grab');
                            const timeLeft = Math.max(0, Math.ceil((c.openTime - Date.now()) / 1000));
                            if (btnEl && btnEl.classList.contains('btn-countdown')) {
                                btnEl.textContent = `⏳ 等待开放 ${formatTime(timeLeft)}`;
                            }
                            if (timeLeft <= 0) {
                                c._countdownActive = false;
                                c.openTime = null;
                                saveCourses([...courses]);
                                renderAllCoursesGrid();
                                updateStats();
                            }
                        }
                    }
                });
            }

            function formatTime(seconds) {
                if (seconds <= 0) return '00:00';
                const m = Math.floor(seconds / 60);
                const s = seconds % 60;
                return `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
            }

            // ==================== 渲染 ====================
            function renderAll() {
                renderAllCoursesGrid();
                updateMyCoursesPanel();
                updateStats();
            }

            function getFilteredAndSortedCourses() {
                let result = [...courses];
                const now = Date.now();

                // 应用筛选
                switch (currentFilter) {
                    case 'available':
                        result = result.filter(c => c.enrolled < c.capacity && (!c.openTime || now >= c.openTime));
                        break;
                    case 'almost-full':
                        result = result.filter(c => {
                            if (c.enrolled >= c.capacity) return false;
                            if (c.openTime && now < c.openTime) return false;
                            const remaining = c.capacity - c.enrolled;
                            return remaining <= Math.max(3, c.capacity * 0.15);
                        });
                        break;
                    case 'countdown':
                        result = result.filter(c => c.openTime && now < c.openTime);
                        break;
                    case 'full':
                        result = result.filter(c => c.enrolled >= c.capacity);
                        break;
                    default:
                        break;
                }

                // 搜索
                const searchTerm = $searchInput.value.trim().toLowerCase();
                if (searchTerm) {
                    result = result.filter(c =>
                        c.name.toLowerCase().includes(searchTerm) ||
                        c.teacher.toLowerCase().includes(searchTerm) ||
                        c.category.toLowerCase().includes(searchTerm)
                    );
                }

                // 排序
                const sortBy = $sortSelect.value;
                switch (sortBy) {
                    case 'remaining-asc':
                        result.sort((a, b) => (a.capacity - a.enrolled) - (b.capacity - b.enrolled));
                        break;
                    case 'remaining-desc':
                        result.sort((a, b) => (b.capacity - b.enrolled) - (a.capacity - a.enrolled));
                        break;
                    case 'credits-desc':
                        result.sort((a, b) => b.credits - a.credits);
                        break;
                    case 'credits-asc':
                        result.sort((a, b) => a.credits - b.credits);
                        break;
                    default:
                        // 默认：倒计时优先，然后按剩余名额升序
                        result.sort((a, b) => {
                            const aCountdown = a.openTime && now < a.openTime ? 1 : 0;
                            const bCountdown = b.openTime && now < b.openTime ? 1 : 0;
                            if (aCountdown !== bCountdown) return bCountdown - aCountdown;
                            return (a.capacity - a.enrolled) - (b.capacity - b.enrolled);
                        });
                        break;
                }
                return result;
            }

            function renderAllCoursesGrid() {
                const filteredCourses = getFilteredAndSortedCourses();
                const now = Date.now();

                if (filteredCourses.length === 0) {
                    $coursesGrid.innerHTML = `
                        <div style="grid-column: 1/-1; text-align:center; padding:50px 20px; color:#cbd5e1;">
                            <span style="font-size:3rem;display:block;">🔍</span>
                            <p style="margin-top:10px;font-weight:600;">没有找到匹配的课程</p>
                        </div>`;
                    return;
                }

                $coursesGrid.innerHTML = filteredCourses.map(c => {
                    const remaining = Math.max(0, c.capacity - c.enrolled);
                    const isFull = remaining <= 0;
                    const isCountdown = c.openTime && now < c.openTime;
                    const isAlmostFull = !isFull && !isCountdown && remaining <= Math.max(3, c.capacity * 0.15);
                    const isHot = !isFull && !isCountdown && remaining <= Math.max(5, c.capacity * 0.2);
                    const isMyCourse = myCourseIds.has(c.id);
                    const ratio = c.capacity > 0 ? (c.enrolled / c.capacity) : 1;
                    const timeLeft = isCountdown ? Math.max(0, Math.ceil((c.openTime - now) / 1000)) : 0;

                    let barColorClass = 'green';
                    let remainingColorClass = 'green';
                    if (isFull) {
                        barColorClass = 'full';
                        remainingColorClass = 'full';
                    } else if (ratio > 0.9) {
                        barColorClass = 'red';
                        remainingColorClass = 'red';
                    } else if (ratio > 0.7) {
                        barColorClass = 'orange';
                        remainingColorClass = 'orange';
                    }

                    let cardClass = '';
                    if (isFull) cardClass = 'full-course';
                    else if (isCountdown) cardClass = 'countdown-course';
                    else if (isHot) cardClass = 'hot-course';

                    let tagsHTML = '';
                    tagsHTML += `<span class="tag tag-category">${escapeHTML(c.category)}</span>`;
                    if (isCountdown) {
                        tagsHTML +=
                            `<span class="tag tag-countdown">⏳ 即将开放</span>`;
                    } else if (isFull) {
                        tagsHTML += `<span class="tag tag-hot">已满员</span>`;
                    } else if (isAlmostFull) {
                        tagsHTML +=
                            `<span class="tag tag-hot">🔥 即将满员</span>`;
                    } else if (isHot) {
                        tagsHTML += `<span class="tag tag-hot">热门</span>`;
                    }
                    if (isMyCourse) {
                        tagsHTML += `<span class="tag tag-new">✅ 已选</span>`;
                    }

                    let actionHTML = '';
                    if (isMyCourse) {
                        actionHTML = `
                            <button class="btn btn-drop" onclick="window.dropCourse('${c.id}')" title="退课">
                                ⛔ 退课
                            </button>
                            <button class="btn btn-detail" onclick="window.showDetail('${c.id}')" title="查看详情">
                                📖
                            </button>`;
                    } else if (isFull) {
                        actionHTML = `
                            <button class="btn btn-grab" disabled>已满员</button>
                            <button class="btn btn-detail" onclick="window.showDetail('${c.id}')" title="查看详情">📖</button>`;
                    } else if (isCountdown) {
                        actionHTML = `
                            <button class="btn btn-countdown" disabled>⏳ 等待开放 ${formatTime(timeLeft)}</button>
                            <button class="btn btn-detail" onclick="window.showDetail('${c.id}')" title="查看详情">📖</button>`;
                    } else {
                        actionHTML = `
                            <button class="btn btn-grab" onclick="window.confirmGrab('${c.id}')" title="立即抢课！">
                                ⚡ 立即抢课
                            </button>
                            <button class="btn btn-detail" onclick="window.showDetail('${c.id}')" title="查看详情">📖</button>`;
                    }

                    return `
                        <div class="course-card ${cardClass}" data-course-id="${c.id}">
                            <div class="course-tags">${tagsHTML}</div>
                            <div class="course-name">${escapeHTML(c.name)}</div>
                            <div class="course-meta">
                                <span>👨‍🏫 ${escapeHTML(c.teacher)}</span>
                                <span>📅 ${escapeHTML(c.schedule)}</span>
                                <span>🎯 ${c.credits} 学分</span>
                            </div>
                            <div class="capacity-bar-wrap">
                                <div class="capacity-bar">
                                    <div class="capacity-bar-fill ${barColorClass}" style="width: ${Math.min(100, ratio * 100)}%;"></div>
                                </div>
                                <span class="remaining-text ${remainingColorClass}">
                                    ${isFull ? '已满' : `剩${remaining}个`}
                                </span>
                            </div>
                            <div style="font-size:0.75rem;color:var(--text-secondary);">
                                共 ${c.capacity} 个名额 · 已选 ${c.enrolled} 人
                            </div>
                            <div class="course-actions">
                                ${actionHTML}
                            </div>
                        </div>`;
                }).join('');
            }

            function updateMyCoursesPanel() {
                const myCourses = courses.filter(c => myCourseIds.has(c.id));
                const totalCredits = myCourses.reduce((sum, c) => sum + c.credits, 0);
                const remainingCredits = MAX_CREDITS - totalCredits;
                const ratio = Math.min(100, (totalCredits / MAX_CREDITS) * 100);

                $sidebarCredits.textContent = `${totalCredits} / ${MAX_CREDITS}`;
                $creditBarFill.style.width = `${ratio}%`;
                $navCredits.textContent = totalCredits;

                if (remainingCredits <= 3 && remainingCredits > 0) {
                    $creditRemainingText.innerHTML =
                        `<span style="color:#d97706;">⚠️ 还可选 <strong>${remainingCredits}</strong> 学分</span>`;
                    $creditRemainingText.className = 'credit-text warning';
                } else if (remainingCredits <= 0) {
                    $creditRemainingText.innerHTML =
                    `<span style="color:#dc2626;">🚫 学分已满，不可再选</span>`;
                    $creditRemainingText.className = 'credit-text warning';
                } else {
                    $creditRemainingText.textContent = `还可选 ${remainingCredits} 学分`;
                    $creditRemainingText.className = 'credit-text';
                }

                if (myCourses.length === 0) {
                    $myCoursesList.innerHTML = `
                        <div class="empty-state">
                            <span class="icon">📭</span>
                            <p>暂未选课</p>
                            <p style="font-size:0.75rem;">快去抢课吧！</p>
                        </div>`;
                } else {
                    $myCoursesList.innerHTML = myCourses.map(c => `
                        <div class="my-course-item">
                            <div class="course-info">
                                <div class="course-name-sm">${escapeHTML(c.name)}</div>
                                <div class="course-credits-sm">${c.credits} 学分 · ${escapeHTML(c.teacher)}</div>
                            </div>
                            <button class="btn-drop-sm" onclick="window.dropCourse('${c.id}')">退课</button>
                        </div>
                    `).join('');
                }
            }

            function updateStats() {
                const now = Date.now();
                const available = courses.filter(c =>
                    c.enrolled < c.capacity && (!c.openTime || now >= c.openTime)
                );
                const almostFull = available.filter(c =>
                    (c.capacity - c.enrolled) <= Math.max(3, c.capacity * 0.15)
                );
                const totalCredits = courses.filter(c => myCourseIds.has(c.id)).reduce((s, c) => s + c.credits, 0);

                $availableCount.textContent = available.length;
                $almostFullCount.textContent = almostFull.length;
                $navCredits.textContent = totalCredits;
            }

            function escapeHTML(str) {
                const div = document.createElement('div');
                div.textContent = str;
                return div.innerHTML;
            }

            // ==================== 选课逻辑 ====================
            function grabCourse(courseId) {
                updateCountdownStatus();
                const course = courses.find(c => c.id === courseId);
                if (!course) {
                    showToast('课程不存在', 'error');
                    return false;
                }
                if (myCourseIds.has(courseId)) {
                    showToast('你已经选过这门课了', 'warning');
                    return false;
                }
                if (course.enrolled >= course.capacity) {
                    showToast('😭 名额已满！手慢了一步...', 'error');
                    // 刷新显示
                    saveCourses([...courses]);
                    renderAllCoursesGrid();
                    updateStats();
                    updateMyCoursesPanel();
                    return false;
                }
                const now = Date.now();
                if (course.openTime && now < course.openTime) {
                    const tl = Math.ceil((course.openTime - now) / 1000);
                    showToast(`⏳ 还未开放选课，请等待 ${formatTime(tl)}`, 'warning');
                    return false;
                }
                // 检查学分上限
                const currentCredits = courses.filter(c => myCourseIds.has(c.id)).reduce((s, c) => s + c.credits, 0);
                if (currentCredits + course.credits > MAX_CREDITS) {
                    showToast(`🚫 学分超出上限！当前${currentCredits}学分+${course.credits}学分 > ${MAX_CREDITS}`, 'error');
                    return false;
                }
                // 检查时间冲突
                const myCourses = courses.filter(c => myCourseIds.has(c.id));
                const conflict = myCourses.find(mc => hasScheduleConflict(mc.schedule, course.schedule));
                if (conflict) {
                    showToast(`⚠️ 与已选课程「${conflict.name}」时间冲突！`, 'warning');
                    return false;
                }

                // 执行选课
                course.enrolled += 1;
                myCourseIds.add(courseId);
                saveCourses([...courses]);
                saveMyCourses();
                renderAllCoursesGrid();
                updateStats();
                updateMyCoursesPanel();

                // 特效
                spawnParticles();
                const cardEl = document.querySelector(`[data-course-id="${courseId}"]`);
                if (cardEl) {
                    const btn = cardEl.querySelector('.btn-grab');
                    if (btn) {
                        btn.classList.add('success-flash');
                        setTimeout(() => btn.classList.remove('success-flash'), 600);
                    }
                }
                showToast(`✅ 抢课成功！已选「${course.name}」`, 'success');
                return true;
            }

            function dropCourse(courseId) {
                if (!myCourseIds.has(courseId)) {
                    showToast('你未选此课程', 'info');
                    return;
                }
                const course = courses.find(c => c.id === courseId);
                if (course && course.enrolled > 0) {
                    course.enrolled -= 1;
                }
                myCourseIds.delete(courseId);
                saveCourses([...courses]);
                saveMyCourses();
                renderAllCoursesGrid();
                updateStats();
                updateMyCoursesPanel();
                if (course) {
                    showToast(`已退课「${course.name}」，名额已释放`, 'info');
                }
            }

            function clearAllCourses() {
                if (myCourseIds.size === 0) {
                    showToast('没有已选课程', 'info');
                    return;
                }
                const count = myCourseIds.size;
                myCourseIds.forEach(cid => {
                    const course = courses.find(c => c.id === cid);
                    if (course && course.enrolled > 0) {
                        course.enrolled -= 1;
                    }
                });
                myCourseIds.clear();
                saveCourses([...courses]);
                saveMyCourses();
                renderAllCoursesGrid();
                updateStats();
                updateMyCoursesPanel();
                showToast(`已退选全部 ${count} 门课程`, 'info');
            }

            function hasScheduleConflict(schedule1, schedule2) {
                const parseSlots = (schedule) => {
                    const slots = [];
                    const parts = schedule.split(/[,，]/);
                    parts.forEach(part => {
                        const trimmed = part.trim();
                        const match = trimmed.match(/(周[一二三四五六日])\s*(\d+)-(\d+)节/);
                        if (match) {
                            slots.push({ day: match[1], start: parseInt(match[2]), end: parseInt(match[3]) });
                        }
                    });
                    return slots;
                };
                const slots1 = parseSlots(schedule1);
                const slots2 = parseSlots(schedule2);
                for (const s1 of slots1) {
                    for (const s2 of slots2) {
                        if (s1.day === s2.day) {
                            if (!(s1.end < s2.start || s2.end < s1.start)) {
                                return true;
                            }
                        }
                    }
                }
                return false;
            }

            // ==================== Toast消息 ====================
            function showToast(message, type = 'info') {
                const toast = document.createElement('div');
                toast.className = `toast ${type}`;
                toast.textContent = message;
                $toastContainer.appendChild(toast);
                setTimeout(() => {
                    if (toast.parentNode) {
                        toast.remove();
                    }
                }, 2600);
            }

            // ==================== 粒子特效 ====================
            function spawnParticles() {
                const emojis = ['🎉', '✨', '💫', '⭐', '🌟', '🎊', '💎', '🔥'];
                const count = 18;
                for (let i = 0; i < count; i++) {
                    const particle = document.createElement('span');
                    particle.className = 'particle';
                    particle.textContent = emojis[Math.floor(Math.random() * emojis.length)];
                    particle.style.left = `${40 + Math.random() * 20}%`;
                    particle.style.top = `${30 + Math.random() * 20}%`;
                    particle.style.setProperty('--dx', `${(Math.random() - 0.5) * 500}px`);
                    particle.style.setProperty('--dy', `${(Math.random() - 0.5) * 400 - 150}px`);
                    particle.style.animationDuration = `${0.8 + Math.random() * 1.2}s`;
                    $particlesContainer.appendChild(particle);
                    setTimeout(() => {
                        if (particle.parentNode) particle.remove();
                    }, 1500);
                }
            }

            // ==================== 模态框 ====================
            function showDetail(courseId) {
                const course = courses.find(c => c.id === courseId);
                if (!course) return;
                const remaining = Math.max(0, course.capacity - course.enrolled);
                const now = Date.now();
                const isCountdown = course.openTime && now < course.openTime;
                const timeLeft = isCountdown ? Math.ceil((course.openTime - now) / 1000) : 0;

                $modalContent.innerHTML = `
                    <h3>📖 ${escapeHTML(course.name)}</h3>
                    <p><strong>教师：</strong>${escapeHTML(course.teacher)}</p>
                    <p><strong>学分：</strong>${course.credits} 学分</p>
                    <p><strong>类别：</strong>${escapeHTML(course.category)}</p>
                    <p><strong>时间：</strong>${escapeHTML(course.schedule)}</p>
                    <p><strong>名额：</strong>${course.capacity} 人（已选 ${course.enrolled}，剩余 ${remaining}）</p>
                    <p><strong>简介：</strong>${escapeHTML(course.description)}</p>
                    ${isCountdown ? `<p style="color:#d97706;">⏳ 该课程将在 <strong>${formatTime(timeLeft)}</strong> 后开放选课</p>` : ''}
                    ${myCourseIds.has(courseId) ? '<p style="color:#10b981;">✅ 你已选此课程</p>' : ''}
                    <div class="modal-actions">
                        <button class="btn-modal cancel" onclick="window.closeDetail()">关闭</button>
                    </div>
                `;
                $modalOverlay.style.display = 'flex';
            }

            function closeDetail() {
                $modalOverlay.style.display = 'none';
            }

            function confirmGrab(courseId) {
                const course = courses.find(c => c.id === courseId);
                if (!course) return;
                const remaining = Math.max(0, course.capacity - course.enrolled);
                const currentCredits = courses.filter(c => myCourseIds.has(c.id)).reduce((s, c) => s + c.credits, 0);
                const afterCredits = currentCredits + course.credits;
                const myCourses = courses.filter(c => myCourseIds.has(c.id));
                const conflict = myCourses.find(mc => hasScheduleConflict(mc.schedule, course.schedule));

                let warningsHTML = '';
                if (afterCredits > MAX_CREDITS) {
                    warningsHTML +=
                        `<p style="color:#dc2626;">⚠️ 选课后总学分 ${afterCredits}，超出上限 ${MAX_CREDITS}！无法选课。</p>`;
                }
                if (conflict) {
                    warningsHTML +=
                        `<p style="color:#d97706;">⚠️ 与已选课程「${escapeHTML(conflict.name)}」时间冲突！</p>`;
                }
                if (remaining <= 3 && remaining > 0) {
                    warningsHTML +=
                    `<p style="color:#ef4444;">🔥 仅剩 <strong>${remaining}</strong> 个名额，请尽快确认！</p>`;
                }

                $confirmModalContent.innerHTML = `
                    <h3>⚡ 确认抢课</h3>
                    <p><strong>课程：</strong>${escapeHTML(course.name)}</p>
                    <p><strong>教师：</strong>${escapeHTML(course.teacher)}</p>
                    <p><strong>学分：</strong>${course.credits} 学分（当前${currentCredits} → 选后${afterCredits}）</p>
                    <p><strong>剩余名额：</strong>${remaining} / ${course.capacity}</p>
                    ${warningsHTML}
                    <div class="modal-actions">
                        <button class="btn-modal cancel" onclick="window.closeConfirm()">取消</button>
                        <button class="btn-modal confirm" onclick="window.executeGrab('${courseId}')"
                            ${afterCredits > MAX_CREDITS || (conflict ? true : false) ? 'disabled style="opacity:0.5;cursor:not-allowed;"' : ''}>
                            ✅ 确认抢课
                        </button>
                    </div>
                `;
                $confirmModalOverlay.style.display = 'flex';
                pendingConfirm = courseId;
            }

            function closeConfirm() {
                $confirmModalOverlay.style.display = 'none';
                pendingConfirm = null;
            }

            function executeGrab(courseId) {
                closeConfirm();
                grabCourse(courseId);
            }

            // ==================== 事件监听 ====================
            $searchInput.addEventListener('input', () => {
                renderAllCoursesGrid();
            });

            $sortSelect.addEventListener('change', () => {
                renderAllCoursesGrid();
            });

            $refreshBtn.addEventListener('click', () => {
                $refreshBtn.classList.add('spinning');
                setTimeout(() => $refreshBtn.classList.remove('spinning'), 700);
                updateCountdownStatus();
                const changed = checkExternalChanges();
                if (changed || true) {
                    courses = loadCourses();
                    myCourseIds = loadMyCourses();
                    updateCountdownStatus();
                    renderAll();
                }
                showToast('已刷新课程数据', 'info');
            });

            $clearAllBtn.addEventListener('click', () => {
                if (myCourseIds.size === 0) {
                    showToast('没有已选课程', 'info');
                    return;
                }
                if (confirm(`确定要退选全部 ${myCourseIds.size} 门课程吗？释放的名额可能被其他人抢走！`)) {
                    clearAllCourses();
                }
            });

            $filterBtns.forEach(btn => {
                btn.addEventListener('click', () => {
                    $filterBtns.forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    currentFilter = btn.dataset.filter;
                    renderAllCoursesGrid();
                });
            });

            $modalOverlay.addEventListener('click', (e) => {
                if (e.target === $modalOverlay) closeDetail();
            });
            $confirmModalOverlay.addEventListener('click', (e) => {
                if (e.target === $confirmModalOverlay) closeConfirm();
            });

            // 监听其他标签页的storage变化
            window.addEventListener('storage', (e) => {
                if (e.key === STORAGE_KEY_COURSES) {
                    const parsed = JSON.parse(e.newValue);
                    if (parsed && JSON.stringify(parsed) !== JSON.stringify(courses)) {
                        courses = parsed;
                        updateCountdownStatus();
                        renderAll();
                    }
                }
                if (e.key === STORAGE_KEY_MY) {
                    const parsed = JSON.parse(e.newValue);
                    const newSet = new Set(parsed || []);
                    if (setsAreDifferent(newSet, myCourseIds)) {
                        myCourseIds = newSet;
                        renderAll();
                    }
                }
            });

            // 键盘快捷键
            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape') {
                    closeDetail();
                    closeConfirm();
                }
                // Ctrl+R 刷新
                if (e.ctrlKey && e.key === 'r') {
                    // 不阻止默认，但我们也刷新
                    setTimeout(() => {
                        updateCountdownStatus();
                        renderAll();
                    }, 100);
                }
            });

            // ==================== 暴露全局方法 ====================
            window.grabCourse = grabCourse;
            window.dropCourse = dropCourse;
            window.showDetail = showDetail;
            window.closeDetail = closeDetail;
            window.confirmGrab = confirmGrab;
            window.closeConfirm = closeConfirm;
            window.executeGrab = executeGrab;
            window.clearAllCourses = clearAllCourses;

            // ==================== 启动应用 ====================
            init();
            console.log('🎓 学生选课系统已就绪');
            console.log('📊 课程总数:', courses.length);
            console.log('👤 学生: 张三 | 2024级');
            console.log('💡 提示: 打开多个浏览器标签页可以模拟多人同时抢课！');
            console.log('⏳ 部分热门课程设有开放倒计时，请留意！');
            console.log('🔥 系统每', SIMULATOR_INTERVAL / 1000, '秒模拟其他学生选课，名额持续减少中...');
            console.log('🔄 界面每', UI_REFRESH_INTERVAL / 1000, '秒自动同步最新数据');
        })();
    </script>
</body>
</html>
